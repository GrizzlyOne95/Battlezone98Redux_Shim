; Test multiplayer profile for OpenShim packet-stability diagnostics.
; Copy this file next to battlezone98redux.exe or BZR.exe as net.ini.
; The goal is a higher update rate than the common 4000-bandwidth workshop
; profile while making auto-disconnect behavior much less aggressive during
; loss and reorder investigations.

[Net]
MaxPing=300
UpCount=100
DownCount=50
MinBandwidth=8000
MaxBandwidth=32000
MaxPingsLost=60
AutoKickStart=180000
AutoKickPing=2000
AutoKickLoss=100
AutoKickTime=180000
UseCompression=1

[OpenShimSocket]
EnablePacketReorder=1
PacketReorderWindowMs=30
PacketReorderDepth=8
PacketReorderPeers=32
PacketReorderDrainCap=32
LogPacketReorder=1
EnableBufferLog=0
BufferLogPayloadBytes=32
BufferLogRingRecords=65536
BufferLogSocketId=0
BufferLogPeer=
